<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline';" />
    <title>fact_openedit</title>
  </head>
  <body>

    <header id="header">
      <h1>fact_openedit</h1>
      <div id="session-status">
        <span id="session-label">Non connecte</span>
        <button id="btn-login" class="btn-primary">Se connecter</button>
      </div>
    </header>

    <main id="grid">

      <!-- Colonne gauche : tableau des factures -->
      <section id="card-invoices" class="card card--large">
        <div class="card-header">
          <h2>Factures</h2>
          <div id="filters">
            <input type="text" id="search-input" placeholder="Rechercher..." style="width:160px" />
            <select id="filter-year">
              <option value="">Toutes les annees</option>
            </select>
            <select id="filter-status">
              <option value="">Tous les statuts</option>
              <option value="downloaded">Telechargees</option>
              <option value="sent_to_accountant">Envoyees comptable</option>
            </select>
            <select id="filter-paid">
              <option value="">Acquittement</option>
              <option value="1">Acquittees</option>
              <option value="0">Non acquittees</option>
            </select>
            <button id="btn-refresh" class="btn-secondary btn-small">Actualiser</button>
          </div>
        </div>
        <div class="table-wrapper">
          <table id="invoices-table">
            <thead>
              <tr>
                <th data-sort="openedit_id">N. <span class="sort-icon"></span></th>
                <th data-sort="year">Annee <span class="sort-icon"></span></th>
                <th data-sort="client_name">Entreprise <span class="sort-icon"></span></th>
                <th data-sort="client_contact">Responsable <span class="sort-icon"></span></th>
                <th data-sort="client_city">Ville <span class="sort-icon"></span></th>
                <th data-sort="issue_date">Date emission <span class="sort-icon"></span></th>
                <th data-sort="amount_cents">Montant TTC <span class="sort-icon"></span></th>
                <th data-sort="is_paid">Acquittee <span class="sort-icon"></span></th>
                <th data-sort="status">Statut <span class="sort-icon"></span></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="invoices-body"></tbody>
          </table>
          <p id="invoices-empty" class="empty-state" hidden>
            Aucune facture. Lancez un scan pour commencer.
          </p>
        </div>
        <div id="invoices-count" class="table-footer"></div>
      </section>

      <!-- Colonne droite : scan -->
      <section id="card-scan" class="card">
        <div class="card-header">
          <h2>Scanner</h2>
        </div>

        <div class="form-row-inline">
          <div class="form-row">
            <label for="seg-from">Du n.</label>
            <input type="number" id="seg-from" placeholder="1001" min="1" />
          </div>
          <div class="form-row">
            <label for="seg-to">Au n.</label>
            <input type="number" id="seg-to" placeholder="1110" min="1" />
          </div>
        </div>

        <div class="form-actions">
          <button id="btn-scan" class="btn-primary">Lancer</button>
        </div>

        <div class="form-row form-row--checkbox">
          <input type="checkbox" id="slow-mode" />
          <label for="slow-mode">Delai long (7-10s, anti-bannissement)</label>
        </div>

        <div id="scan-progress" hidden>
          <div class="progress-bar-wrap">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
          <p id="progress-text" class="meta-text"></p>
          <p id="progress-url" class="url-mono"></p>
        </div>

        <div id="scan-result" hidden>
          <p id="scan-result-text" class="meta-text"></p>
        </div>


      </section>


    </main>

    <dialog id="scan-confirm-modal">
      <div class="modal-header">
        <h3>Confirmation du scan</h3>
        <p id="modal-plan-info" class="modal-meta"></p>
      </div>
      <div id="modal-plan-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-btn-cancel" class="btn-secondary">Annuler</button>
        <button id="modal-btn-confirm" class="btn-primary">Confirmer</button>
      </div>
    </dialog>

  </body>
</html>
