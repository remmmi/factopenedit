name: Build Windows

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run make

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: fact-openedit-windows
          path: out/make/squirrel.windows/x64/fact-openedit-setup.exe
          retention-days: 30
