name: Build Windows

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run make

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: fact-openedit-windows
          path: out/make/squirrel.windows/x64/fact-openedit-setup.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "fact-openedit ${{ github.ref_name }}"
          files: out/make/squirrel.windows/x64/fact-openedit-setup.exe
          draft: false
          prerelease: false
